<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - IoT Water Monitor</title>
    <script src="../config.js" defer></script>
    <script src="../common.js" defer></script>
    <script src="./app.js" defer></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="register">
    <div class="backdrop"></div>
    <main class="shell login-shell">
      <section class="login-panel">
        <div class="hero-copy">
          <p class="eyebrow">Wokwi + ESP32 + Railway</p>
          <h1>Crea tu cuenta de operador.</h1>
          <p class="subcopy">
            Regístrate para gestionar alertas y acceder al dashboard privado.
          </p>
        </div>

        <article class="panel auth-panel">
          <div class="panel-head">
            <h2>Registro</h2>
          </div>
          <form id="registerForm" class="login-form">
            <input id="nombre" type="text" placeholder="Nombre" autocomplete="name" />
            <input id="email" type="email" placeholder="Email" autocomplete="email" />
            <input id="password" type="password" placeholder="Password" autocomplete="new-password" />
            <div class="operator-actions">
              <button type="submit">Registrar</button>
            </div>
          </form>
          <p id="registerMessage" class="helper" data-state="info" role="status" aria-live="polite">
            Crea una cuenta para confirmar alertas desde el dashboard.
          </p>
          <div class="helper-links">
            <a href="../login/" class="button secondary">Ir a login</a>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
